name: Conference Crawler

on:
  schedule:
    - cron: "0 8 1 */2 *" # Every two months (1st day of the month, every 2 months at 8 AM UTC)
  workflow_dispatch: # Allows manual run from GitHub actions tab

permissions:
  contents: write # Required to commit changes and push branch
  pull-requests: write # Required to open a Pull Request

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 fake-useragent python-dotenv pyyaml

      - name: Run Crawler Script with Auto-Merge
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/update_confs_llm.py --auto-merge

      - name: Generate PR Description Markdown
        run: |
          if [ -f suggested_updates_llm.yaml ]; then
            python scripts/notify_updates.py --write-pr-body pr_body.md
          else
            echo "No suggested updates file found."
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: automatically update conferences.yaml"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: automated-conference-updates
          title: "[CONFERENCE CRAWLER] Automated conference updates"
          body-path: pr_body.md
          labels: |
            conference-update
            automated-pr
