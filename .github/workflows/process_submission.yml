name: Process Conference Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  process-submission:
    if: |
      contains(github.event.issue.title, '[ADD-CONFERENCE]') ||
      (github.event.label.name == 'add-conference')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Parse issue and update database
        id: parse-issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/add_conf_from_issue.py

      - name: Create Pull Request
        if: success()
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add ${{ steps.parse-issue.outputs.conf_name }} ${{ steps.parse-issue.outputs.conf_year }} via form"
          branch: "add-conf/${{ steps.parse-issue.outputs.conf_name }}-${{ steps.parse-issue.outputs.conf_year }}"
          title: "feat: add ${{ steps.parse-issue.outputs.conf_name }} ${{ steps.parse-issue.outputs.conf_year }}"
          body: |
            This PR was automatically created from the user submission in issue #${{ github.event.issue.number }}.
            
            Please review the diff and merge if correct.
          delete-branch: true

      - name: Comment on issue and close
        if: success() && steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.cpr.outputs.pull-request-url }}';
            const issueNumber = context.issue.number;
            
            // Add comment linking to the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🎉 Submission received! A Pull Request has been automatically opened here: ${prUrl}\n\nThis issue will now be closed. Thank you for your contribution!`
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
